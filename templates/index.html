<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Diabetes Prediction (Salma)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 24px auto; padding: 0 16px; background-color: #f8f9fa; }
    .container { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #333; margin-bottom: 24px; }
    form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 6px; color: #495057; }
    input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 4px; }
    .full { grid-column: 1 / -1; }
    .submit { grid-column: 1 / -1; text-align: right; margin-top: 12px; }
    button { padding: 12px 24px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
    button:hover { background-color: #0056b3; }
    .result { margin-top: 24px; padding: 16px; background-color: #d4edda; border-left: 5px solid #28a745; color: #155724; font-weight: bold; font-size: 18px; border-radius: 4px; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <h1>Diabetes Prediction (Salma)</h1>

  {% if prediction %}
    <div class="result">Hasil prediksi: {{ prediction }}</div>
  {% endif %}

  <form method="post" action="/predict">
    <div class="full">
      <label for="model">Model Machine Learning</label>
      <select id="model" name="model" required>
        {% for m in model_names %}
          <option value="{{ m }}">{{ m }}</option>
        {% endfor %}
      </select>
    </div>

    <div><label>Pregnancies</label><input type="number" name="pregnancies" required placeholder="Contoh: 2"></div>
    <div><label>Glucose</label><input type="number" name="glucose" required placeholder="Contoh: 120"></div>
    <div><label>BloodPressure</label><input type="number" name="blood_pressure" required placeholder="Contoh: 80"></div>
    <div><label>SkinThickness</label><input type="number" name="skin_thickness" required placeholder="Contoh: 20"></div>
    <div><label>Insulin</label><input type="number" name="insulin" required placeholder="Contoh: 79"></div>
    <div><label>BMI</label><input type="number" step="0.1" name="bmi" required placeholder="Contoh: 32.5"></div>
    <div><label>DiabetesPedigreeFunction</label><input type="number" step="0.001" name="diabetes_pedigree" required placeholder="Contoh: 0.375"></div>
    <div><label>Age</label><input type="number" name="age" required placeholder="Contoh: 25"></div>

    <div class="submit"><button type="submit">Predict</button></div>
  </form>
</div>
</body>
</html>
